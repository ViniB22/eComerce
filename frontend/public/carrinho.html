<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/api.js" defer></script>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/carrinho.js" defer></script>
    <title>Carrinho - TechStore</title>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🛒 TechStore</h1>
            </div>
            <div class="nav-links">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="produtos.html" class="nav-link">Produtos</a>
                <a href="carrinho.html" class="nav-link active">Carrinho</a>
                <div class="nav-auth">
                    <a href="login.html" class="btn btn-outline" id="loginBtn">Entrar</a>
                    <a href="registro.html" class="btn btn-primary" id="registroBtn">Cadastrar</a>
                    <div class="user-menu" id="userMenu" style="display: none;">
                        <span id="userName"></span>
                        <div class="dropdown">
                            <a href="perfil.html">Meu Perfil</a>
                            <a href="pedidos.html">Meus Pedidos</a>
                            <button id="logoutBtn">Sair</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="container">
            <div class="page-header">
                <h1>Meu Carrinho</h1>
            </div>

            <div class="cart-container">
                <div class="cart-items" id="cartItems">
                    <!-- Itens do carrinho carregados via JavaScript -->
                    <div class="empty-cart" id="emptyCart">
                        <p>Seu carrinho está vazio</p>
                        <a href="produtos.html" class="btn btn-primary">Continuar Comprando</a>
                    </div>
                </div>

                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <h3>Resumo do Pedido</h3>
                    <div class="summary-line">
                        <span>Subtotal:</span>
                        <span id="subtotal">R$ 0,00</span>
                    </div>
                    <div class="summary-line">
                        <span>Frete:</span>
                        <span id="frete">R$ 0,00</span>
                    </div>
                    <div class="summary-line total">
                        <span>Total:</span>
                        <span id="total">R$ 0,00</span>
                    </div>
                    <button class="btn btn-primary btn-full" id="checkoutBtn">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 TechStore. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
